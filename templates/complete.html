<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Complete — False 9</title>
  <style>
    :root {
      --white: #FFFFFF;
      --green: #2D6A4F;
      --charcoal: #1E1E1E;
      --ash: #E8E8E8;
      --deep-forest: #1B4332;
      --green-tint: #D8F3DC;
      --muted: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--white);
      color: var(--charcoal);
      font-family: Arial, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(45,106,79,0.07) 0%, transparent 60%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 580px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }

    .trophy {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      animation: bounceIn 0.6s ease both;
    }

    h1 {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(44px, 9vw, 80px);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -1px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    h1 .line1 { color: var(--green);    display: block; }
    h1 .line2 { color: var(--charcoal); display: block; }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin: 22px 0 36px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .lessons-visited {
      background: var(--white);
      border: 1.5px solid var(--ash);
      border-radius: 3px;
      padding: 22px;
      margin-bottom: 32px;
      text-align: left;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    .lessons-visited h3 {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 14px;
    }

    .lesson-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--ash);
      font-size: 13px;
      color: var(--charcoal);
    }

    .lesson-row:last-child { border-bottom: none; }

    .check {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.5s 0.45s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 13px 28px;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--green);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--deep-forest); }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--ash);
    }
    .btn-secondary:hover { background: var(--ash); color: var(--charcoal); }

    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.3); }
      60%  { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <span class="trophy">🏆</span>
    <h1>
      <span class="line1">COURSE</span>
      <span class="line2">COMPLETE</span>
    </h1>
    <p class="subtitle">You now understand one of football's most influential tactical concepts.</p>

    {% if visited %}
    <div class="lessons-visited">
      <h3>Lessons Completed</h3>
      {% for num, data in visited.items() | sort %}
        <div class="lesson-row">
          <span class="check">✓</span>
          <span>{{ data.lesson_title }}</span>
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="btn-row">
      <a href="/learn/1" class="btn btn-primary">Review from Start ↺</a>
      <a href="/" class="btn btn-secondary">← Home</a>
    </div>
  </div>
</body>
</html>
