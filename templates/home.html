<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The False 9 — A Soccer Masterclass</title>
  <style>
    :root {
      --white: #FFFFFF;
      --green: #2D6A4F;
      --charcoal: #1E1E1E;
      --ash: #E8E8E8;
      --deep-forest: #1B4332;
      --green-tint: #D8F3DC;
      --muted: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--white);
      color: var(--charcoal);
      font-family: Arial, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-tint);
      border: 1px solid rgba(45,106,79,0.3);
      padding: 6px 16px;
      border-radius: 2px;
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    h1 {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(50px, 11.2vw, 112px);
      line-height: 0.88;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: -2px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    h1 span.false { color: var(--charcoal); display: block; }
    h1 span.nine  { color: var(--green);    display: block; }

    .subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.7;
      margin: 28px 0 12px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .lesson-count {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .lesson-count strong { color: var(--charcoal); }

    .lessons-preview {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .lesson-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ash);
      border: 1px solid #ccc;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--green);
      color: var(--white);
      text-decoration: none;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 18px 44px;
      border-radius: 2px;
      transition: background 0.2s ease;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    .start-btn:hover { background: var(--deep-forest); }

    .arrow { font-size: 16px; transition: transform 0.2s; }
    .start-btn:hover .arrow { transform: translateX(4px); }

    .field-graphic {
      margin-top: 64px;
      opacity: 0.15;
      animation: fadeUp 0.5s 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      background: var(--deep-forest);
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 18px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="badge">Soccer Tactics · Deep Dive</div>
    <h1>
      <span class="false">FALSE</span>
      <span class="nine">9</span>
    </h1>
    <p class="subtitle">The position that confused defenders, broke formations, and changed football forever.</p>
    <div class="lesson-count"><strong>{{ total_lessons }} lessons</strong> &nbsp;·&nbsp; ~10 min read</div>

    <div class="lessons-preview">
      {% for i in range(total_lessons) %}
        <div class="lesson-dot"></div>
      {% endfor %}
    </div>

    <a href="/learn/1" class="start-btn">
      Start Learning <span class="arrow">→</span>
    </a>

    <div class="field-graphic">
      <svg width="200" height="120" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="198" height="118" stroke="#2D6A4F" stroke-width="2" fill="none"/>
        <circle cx="100" cy="60" r="25" stroke="#2D6A4F" stroke-width="2" fill="none"/>
        <circle cx="100" cy="60" r="2" fill="#2D6A4F"/>
        <line x1="100" y1="1" x2="100" y2="119" stroke="#2D6A4F" stroke-width="1.5"/>
        <rect x="1" y="30" width="30" height="60" stroke="#2D6A4F" stroke-width="1.5" fill="none"/>
        <rect x="169" y="30" width="30" height="60" stroke="#2D6A4F" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
  </div>
  <footer>FALSE 9 · TACTICAL MASTERCLASS</footer>
</body>
</html>
