<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The False 9 — A Soccer Masterclass</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #1a7a3c;
      --green-light: #25a554;
      --green-dark: #0e4e26;
      --white: #f5f5f0;
      --off-white: #e8e8e0;
      --yellow: #f0d940;
      --black: #0d0d0d;
      --gray: #888880;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Pitch texture background */
    .pitch-bg {
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(255,255,255,0.015) 60px,
          rgba(255,255,255,0.015) 120px
        ),
        linear-gradient(160deg, #0d1a0f 0%, #0d0d0d 50%, #0a0a14 100%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-light);
      background: rgba(37,165,84,0.12);
      border: 1px solid rgba(37,165,84,0.3);
      padding: 6px 16px;
      border-radius: 2px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 15vw, 160px);
      line-height: 0.88;
      text-align: center;
      letter-spacing: 2px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 span.false {
      color: var(--yellow);
      display: block;
    }

    h1 span.nine {
      color: var(--white);
      display: block;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 300;
      color: var(--gray);
      text-align: center;
      max-width: 440px;
      line-height: 1.6;
      margin: 24px 0 48px;
      animation: fadeUp 0.6s 0.2s ease both;
      font-style: italic;
    }

    .lessons-preview {
      display: flex;
      gap: 8px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .lesson-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .lesson-count {
      font-size: 13px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .lesson-count strong {
      color: var(--white);
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--green);
      color: var(--white);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1px;
      padding: 18px 40px;
      border-radius: 3px;
      transition: all 0.2s ease;
      animation: fadeUp 0.6s 0.4s ease both;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .start-btn:hover {
      background: var(--green-light);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(37,165,84,0.4);
    }

    .start-btn:hover::before { opacity: 1; }

    .arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }
    .start-btn:hover .arrow { transform: translateX(4px); }

    .field-graphic {
      margin-top: 60px;
      opacity: 0.08;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="pitch-bg"></div>
  <div class="content">
    <div class="badge">Soccer Tactics · Deep Dive</div>
    <h1>
      <span class="false">FALSE</span>
      <span class="nine">9</span>
    </h1>
    <p class="subtitle">The position that confused defenders, broke formations, and changed football forever.</p>

    <div class="lesson-count"><strong>{{ total_lessons }} lessons</strong> · ~10 min read</div>

    <div class="lessons-preview">
      {% for i in range(total_lessons) %}
        <div class="lesson-dot"></div>
      {% endfor %}
    </div>

    <a href="/learn/1" class="start-btn">
      Start Learning <span class="arrow">→</span>
    </a>

    <div class="field-graphic">
      <svg width="200" height="120" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="198" height="118" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="100" cy="60" r="25" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="100" cy="60" r="2" fill="white"/>
        <line x1="100" y1="1" x2="100" y2="119" stroke="white" stroke-width="1.5"/>
        <rect x="1" y="30" width="30" height="60" stroke="white" stroke-width="1.5" fill="none"/>
        <rect x="169" y="30" width="30" height="60" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
  </div>
  <footer>FALSE 9 · TACTICAL MASTERCLASS</footer>
</body>
</html>
